name: Deploy to GitHub Pages

# Pages is configured to serve the gh-pages branch.
# This workflow keeps gh-pages in sync with main on every push.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Push main to gh-pages
        run: git push --force origin HEAD:gh-pages
